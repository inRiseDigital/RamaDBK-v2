version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ramadbk_app
    restart: unless-stopped
    working_dir: /var/www/html
    expose:
      - "8000"
    volumes:
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
    environment:
      - APP_NAME=${APP_NAME:-RamaDBK}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - AUCTION_FTP_HOST=${AUCTION_FTP_HOST:-auctionsdata.aleado.com}
      - AUCTION_FTP_USERNAME=${AUCTION_FTP_USERNAME}
      - AUCTION_FTP_PASSWORD=${AUCTION_FTP_PASSWORD}
      - AUCTION_FTP_PATH=${AUCTION_FTP_PATH:-/jp/oneprice}
      - AUCTION_FTP_FILENAME=${AUCTION_FTP_FILENAME:-auct_lots_xml_jp_op.sql.bz2}
      - AUCTION_IMAGE_DISK=${AUCTION_IMAGE_DISK:-s3}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET}
    depends_on:
      - redis
    networks:
      - ramadbk_network

  nginx:
    image: nginx:alpine
    container_name: ramadbk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ramadbk_network

  redis:
    image: redis:7-alpine
    container_name: ramadbk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ramadbk_network

networks:
  ramadbk_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
